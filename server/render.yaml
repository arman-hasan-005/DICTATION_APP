services:
  - type: web
    name: dictaclass-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false # set to your Vercel URL, e.g. https://dictaclass.vercel.app
      - key: GOOGLE_TTS_KEY
        sync: false # optional — leave blank to use browser speech fallback
      - key: PORT
        value: 10000 # Render's default port
    healthCheckPath: /
